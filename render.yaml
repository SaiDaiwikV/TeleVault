services:
  - type: web
    name: televault
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # SQLAlchemy 2.0.36 doesn't support Python 3.14 (Render's current
      # default), so pin to a supported 3.12. Kept in sync with .python-version.
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: TELEVAULT_ENV
        value: production
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_STORAGE_CHANNEL_ID
        sync: false
      - key: TELEGRAM_STRING_SESSION_TELEVAULT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TELEVAULT_APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
